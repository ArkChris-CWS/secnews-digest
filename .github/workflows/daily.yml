name: security-morning-digest

on:
  schedule:
    # UTC 21:40 = 한국시간(KST) 06:40 목표. cron은 항상 UTC 기준이다.
    # GitHub Actions 스케줄은 best-effort라 정각보다 비정각이 덜 밀린다.
    - cron: "40 21 * * *"
  workflow_dispatch: {}   # 수동 실행(테스트)용 버튼

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
